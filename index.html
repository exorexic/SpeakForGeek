<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SpeekForGeek - P2P Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3a 100%);
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* Дискорд-подобный интерфейс */
        .app {
            display: flex;
            height: 100vh;
        }

        /* Боковая панель (сервера) */
        .servers-sidebar {
            width: 72px;
            background: #1e1f22;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            overflow-y: auto;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #5865f2, #4752c4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .server-icon:hover {
            border-radius: 16px;
            background: linear-gradient(135deg, #4752c4, #3b45b0);
        }

        .server-icon.active {
            border-radius: 16px;
            background: linear-gradient(135deg, #5865f2, #4752c4);
        }

        .server-icon.add {
            background: #2b2d31;
            font-size: 28px;
            color: #23a55a;
        }

        .server-icon.add:hover {
            background: #23a55a;
            color: white;
        }

        /* Чат-панель */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #313338;
        }

        /* Хедер чата */
        .chat-header {
            height: 48px;
            background: #2b2d31;
            border-bottom: 1px solid #1e1f22;
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .channel-icon {
            font-size: 20px;
        }

        .channel-name {
            font-weight: 600;
            font-size: 16px;
        }

        .room-code {
            background: #1e1f22;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            color: #23a55a;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #5865f2, #4752c4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            color: #fff;
        }

        .message-time {
            font-size: 10px;
            color: #949ba4;
        }

        .message-text {
            color: #dbdee1;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .system-message {
            background: rgba(88,101,242,0.1);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            color: #949ba4;
            border-left: 3px solid #5865f2;
        }

        /* Ввод сообщения */
        .message-input-area {
            padding: 16px;
            background: #2b2d31;
            border-top: 1px solid #1e1f22;
        }

        .input-wrapper {
            background: #383a40;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }

        .message-input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            color: #dbdee1;
            font-size: 14px;
            outline: none;
        }

        .message-input::placeholder {
            color: #949ba4;
        }

        .send-btn {
            background: #5865f2;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #4752c4;
        }

        /* Модальное окно входа */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #2b2d31;
            border-radius: 16px;
            padding: 32px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #fff;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1e1f22;
            border: 1px solid #383a40;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .modal-input:focus {
            border-color: #5865f2;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-btn.primary {
            background: #5865f2;
            color: white;
        }

        .modal-btn.secondary {
            background: #4e5058;
            color: white;
        }

        .modal-btn:hover {
            filter: brightness(1.1);
        }

        .member-list {
            width: 240px;
            background: #2b2d31;
            border-left: 1px solid #1e1f22;
            display: flex;
            flex-direction: column;
        }

        .member-header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid #1e1f22;
            font-size: 12px;
            color: #949ba4;
        }

        .members {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .member {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 8px;
            margin: 2px 0;
            cursor: pointer;
        }

        .member:hover {
            background: #383a40;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #5865f2, #4752c4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .member-name {
            font-size: 14px;
        }

        .member-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #23a55a;
            margin-left: auto;
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1f22;
        }

        ::-webkit-scrollbar-thumb {
            background: #383a40;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4e5058;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Боковая панель серверов -->
        <div class="servers-sidebar" id="serversSidebar">
            <div class="server-icon" id="mainServerBtn" style="background: #5865f2;">🎙️</div>
            <div class="server-icon add" id="addServerBtn">+</div>
        </div>

        <!-- Основной чат -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="channel-info">
                    <span class="channel-icon">#</span>
                    <span class="channel-name" id="channelName">general</span>
                    <span class="room-code" id="roomCodeDisplay"></span>
                </div>
                <div id="connectionStatus" style="font-size: 12px; color: #23a55a;">🟢 Онлайн</div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="system-message">✨ Добро пожаловать в SpeekForGeek!</div>
                <div class="system-message">💡 Создайте комнату или присоединитесь к существующей</div>
            </div>

            <div class="message-input-area">
                <div class="input-wrapper">
                    <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение..." disabled>
                    <button class="send-btn" id="sendBtn" disabled>➤</button>
                </div>
            </div>
        </div>

        <!-- Список участников -->
        <div class="member-list">
            <div class="member-header">УЧАСТНИКИ — <span id="memberCount">0</span></div>
            <div class="members" id="membersList"></div>
        </div>
    </div>

    <script>
        // P2P переменные
        let peerConnections = new Map(); // userId -> {pc, dataChannel}
        let localUserId = null;
        let currentRoom = null;
        let currentPassword = null;
        let isHost = false;
        let messages = [];
        let members = new Map(); // userId -> {name, avatar}
        
        // Сигнальный сервер для обмена SDP
        let signalingWs = null;
        
        // DOM элементы
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const membersList = document.getElementById('membersList');
        const memberCountSpan = document.getElementById('memberCount');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');
        const connectionStatusSpan = document.getElementById('connectionStatus');
        
        // Аватары
        const avatars = ['🐱', '🐶', '🐼', '🦊', '🐻', '🐨', '🦁', '🐸', '🐒', '🐧', '🦉', '🐺', '🐰', '🦝', '🐘'];
        
        // Генерация случайного имени
        const names = ['Алекс', 'Макс', 'Дэн', 'Крис', 'Джей', 'Сэм', 'Эш', 'Рэй', 'Ник', 'Том', 'Ли', 'Кай', 'Зиг', 'Век', 'Некс'];
        
        function getRandomName() {
            return names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100);
        }
        
        function getRandomAvatar() {
            return avatars[Math.floor(Math.random() * avatars.length)];
        }
        
        // Инициализация пользователя
        localUserId = 'user_' + Math.random().toString(36).substr(2, 8);
        const localName = getRandomName();
        const localAvatar = getRandomAvatar();
        
        members.set(localUserId, { name: localName, avatar: localAvatar, isLocal: true });
        
        // Функции UI
        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'system-message';
            msgDiv.textContent = text;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function addMessage(userId, text) {
            const member = members.get(userId);
            if (!member) return;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.innerHTML = `
                <div class="message-avatar">${member.avatar}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${member.name}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text">${escapeHtml(text)}</div>
                </div>
            `;
            
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function updateMembersList() {
            membersList.innerHTML = '';
            members.forEach((member, userId) => {
                const memberDiv = document.createElement('div');
                memberDiv.className = 'member';
                memberDiv.innerHTML = `
                    <div class="member-avatar">${member.avatar}</div>
                    <div class="member-name">${member.name}${member.isLocal ? ' (Вы)' : ''}</div>
                    <div class="member-status"></div>
                `;
                membersList.appendChild(memberDiv);
            });
            memberCountSpan.textContent = members.size;
        }
        
        // Отправка сообщения через P2P
        function broadcastMessage(text) {
            const message = {
                type: 'message',
                userId: localUserId,
                text: text,
                timestamp: Date.now()
            };
            
            addMessage(localUserId, text);
            
            peerConnections.forEach((conn, userId) => {
                if (conn.dataChannel && conn.dataChannel.readyState === 'open') {
                    conn.dataChannel.send(JSON.stringify(message));
                }
            });
        }
        
        // Создание P2P соединения
        async function createPeerConnection(targetUserId, isInitiator) {
            const config = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            };
            
            const pc = new RTCPeerConnection(config);
            let dataChannel = null;
            
            if (isInitiator) {
                dataChannel = pc.createDataChannel('chat');
                setupDataChannel(dataChannel, targetUserId);
            }
            
            pc.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel(dataChannel, targetUserId);
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate && signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                    signalingWs.send(JSON.stringify({
                        type: 'ice',
                        targetUserId: targetUserId,
                        candidate: event.candidate,
                        room: currentRoom,
                        password: currentPassword,
                        from: localUserId
                    }));
                }
            };
            
            peerConnections.set(targetUserId, { pc, dataChannel });
            return { pc, dataChannel };
        }
        
        function setupDataChannel(channel, targetUserId) {
            channel.onopen = () => {
                addSystemMessage(`✅ ${members.get(targetUserId)?.name || targetUserId} подключился`);
                // Отправляем информацию о себе
                channel.send(JSON.stringify({
                    type: 'userInfo',
                    userId: localUserId,
                    name: localName,
                    avatar: localAvatar
                }));
            };
            
            channel.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    addMessage(data.userId, data.text);
                } else if (data.type === 'userInfo') {
                    if (!members.has(data.userId)) {
                        members.set(data.userId, { name: data.name, avatar: data.avatar });
                        updateMembersList();
                        addSystemMessage(`👤 ${data.name} присоединился к чату`);
                    }
                }
            };
            
            channel.onclose = () => {
                const member = members.get(targetUserId);
                if (member) {
                    addSystemMessage(`❌ ${member.name} отключился`);
                    members.delete(targetUserId);
                    updateMembersList();
                }
                peerConnections.delete(targetUserId);
            };
        }
        
        // Подключение к сигнальному серверу (используем публичный WebSocket)
        function connectToSignaling(room, password, isHosting) {
            return new Promise((resolve, reject) => {
                signalingWs = new WebSocket('wss://ws.ifelse.io');
                
                signalingWs.onopen = () => {
                    signalingWs.send(JSON.stringify({
                        type: 'join',
                        room: room,
                        password: password,
                        userId: localUserId,
                        isHost: isHosting
                    }));
                };
                
                signalingWs.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'joined') {
                        isHost = data.isHost;
                        currentRoom = room;
                        currentPassword = password;
                        roomCodeDisplay.textContent = `🔒 Комната: ${room}`;
                        connectionStatusSpan.innerHTML = '🟢 Подключено';
                        messageInput.disabled = false;
                        sendBtn.disabled = false;
                        addSystemMessage(`🎉 Вы вошли в комнату "${room}"`);
                        addSystemMessage(`👥 В комнате ${data.members?.length || 1} участников`);
                        
                        // Подключаемся к существующим участникам
                        if (data.members) {
                            for (const member of data.members) {
                                if (member !== localUserId && !peerConnections.has(member)) {
                                    await createPeerConnection(member, true);
                                    // Отправляем offer
                                    const offer = await peerConnections.get(member).pc.createOffer();
                                    await peerConnections.get(member).pc.setLocalDescription(offer);
                                    signalingWs.send(JSON.stringify({
                                        type: 'offer',
                                        targetUserId: member,
                                        offer: offer,
                                        room: room,
                                        password: password,
                                        from: localUserId
                                    }));
                                }
                            }
                        }
                        resolve();
                    } else if (data.type === 'offer') {
                        if (!peerConnections.has(data.from)) {
                            await createPeerConnection(data.from, false);
                            await peerConnections.get(data.from).pc.setRemoteDescription(data.offer);
                            const answer = await peerConnections.get(data.from).pc.createAnswer();
                            await peerConnections.get(data.from).pc.setLocalDescription(answer);
                            signalingWs.send(JSON.stringify({
                                type: 'answer',
                                targetUserId: data.from,
                                answer: answer,
                                room: room,
                                password: password,
                                from: localUserId
                            }));
                        }
                    } else if (data.type === 'answer') {
                        const conn = peerConnections.get(data.from);
                        if (conn && conn.pc) {
                            await conn.pc.setRemoteDescription(data.answer);
                        }
                    } else if (data.type === 'ice') {
                        const conn = peerConnections.get(data.from);
                        if (conn && conn.pc) {
                            await conn.pc.addIceCandidate(data.candidate);
                        }
                    } else if (data.type === 'new_member') {
                        if (data.userId !== localUserId && !peerConnections.has(data.userId)) {
                            await createPeerConnection(data.userId, true);
                            const offer = await peerConnections.get(data.userId).pc.createOffer();
                            await peerConnections.get(data.userId).pc.setLocalDescription(offer);
                            signalingWs.send(JSON.stringify({
                                type: 'offer',
                                targetUserId: data.userId,
                                offer: offer,
                                room: room,
                                password: password,
                                from: localUserId
                            }));
                        }
                    } else if (data.type === 'error') {
                        reject(new Error(data.message));
                    }
                };
                
                signalingWs.onerror = () => {
                    reject(new Error('Ошибка подключения к серверу'));
                };
            });
        }
        
        // Модальное окно входа
        function showLoginModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🎙️ SpeekForGeek</h2>
                    <input type="text" class="modal-input" id="roomIdInput" placeholder="ID комнаты" autocomplete="off">
                    <input type="password" class="modal-input" id="roomPasswordInput" placeholder="Пароль комнаты">
                    <div class="modal-buttons">
                        <button class="modal-btn primary" id="createRoomBtn">✨ Создать комнату</button>
                        <button class="modal-btn secondary" id="joinRoomBtn">🔗 Войти в комнату</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const createBtn = document.getElementById('createRoomBtn');
            const joinBtn = document.getElementById('joinRoomBtn');
            const roomIdInput = document.getElementById('roomIdInput');
            const passwordInput = document.getElementById('roomPasswordInput');
            
            createBtn.onclick = async () => {
                const roomId = roomIdInput.value.trim() || 'room_' + Math.random().toString(36).substr(2, 6);
                const password = passwordInput.value.trim() || 'default';
                
                modal.remove();
                try {
                    await connectToSignaling(roomId, password, true);
                    addSystemMessage(`✨ Комната "${roomId}" создана! Пароль: ${password}`);
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                    showLoginModal();
                }
            };
            
            joinBtn.onclick = async () => {
                const roomId = roomIdInput.value.trim();
                const password = passwordInput.value.trim();
                
                if (!roomId) {
                    alert('Введите ID комнаты');
                    return;
                }
                if (!password) {
                    alert('Введите пароль комнаты');
                    return;
                }
                
                modal.remove();
                try {
                    await connectToSignaling(roomId, password, false);
                    addSystemMessage(`🔗 Вы присоединились к комнате "${roomId}"`);
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                    showLoginModal();
                }
            };
        }
        
        // Отправка сообщения
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                broadcastMessage(text);
                messageInput.value = '';
            }
        }
        
        // Создание новой комнаты (через боковую панель)
        document.getElementById('addServerBtn').onclick = () => {
            if (signalingWs) {
                signalingWs.close();
                peerConnections.clear();
                members.clear();
                members.set(localUserId, { name: localName, avatar: localAvatar, isLocal: true });
                updateMembersList();
                messagesArea.innerHTML = '';
                addSystemMessage('✨ Добро пожаловать в SpeekForGeek!');
            }
            showLoginModal();
        };
        
        document.getElementById('mainServerBtn').onclick = () => {
            // Показываем информацию о текущей комнате
            if (currentRoom) {
                addSystemMessage(`🏠 Текущая комната: ${currentRoom} | Пароль: ${currentPassword}`);
            }
        };
        
        // Обработчики
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        // Запуск
        updateMembersList();
        showLoginModal();
    </script>
</body>
</html>
