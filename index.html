<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SpeekForGeek — P2P мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1e1f22;
            color: #e1e3e6;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .sidebar {
            width: 72px;
            background: #111214;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background: #2b2d31;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            transition: all 0.2s;
            cursor: pointer;
            color: #dbdee1;
        }

        .server-icon.active {
            background: #5865f2;
            border-radius: 16px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #1e1f22;
        }

        .header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1f22;
            border-bottom: 1px solid #2b2d31;
        }

        .channel-name {
            font-weight: 600;
            font-size: 16px;
        }

        .room-info {
            font-size: 12px;
            color: #949ba4;
            margin-left: 8px;
        }

        .call-controls {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: #2b2d31;
            border: none;
            color: #e1e3e6;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: 0.1s;
        }

        .icon-btn.danger {
            background: #da373c;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            background: #2b2d31;
            border-radius: 16px;
            padding: 8px 12px;
            align-self: flex-start;
        }

        .message.own {
            background: #4752c4;
            align-self: flex-end;
        }

        .message-header {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #b5bac1;
        }

        .message.own .message-header {
            color: #c7ccff;
        }

        .message-text {
            font-size: 14px;
            word-wrap: break-word;
        }

        .input-area {
            padding: 16px;
            background: #1e1f22;
            border-top: 1px solid #2b2d31;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: #383a40;
            border: none;
            border-radius: 24px;
            padding: 12px 16px;
            color: #e1e3e6;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            background: #5865f2;
            border: none;
            border-radius: 24px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .peer-info {
            background: #111214;
            padding: 8px 12px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #2b2d31;
        }

        @media (max-width: 640px) {
            .sidebar {
                width: 60px;
            }
            .server-icon {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .message {
                max-width: 90%;
            }
            .icon-btn {
                width: 32px;
                height: 32px;
                font-size: 18px;
            }
        }

        .call-overlay {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: #2b2d31;
            border-radius: 32px;
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #2b2d31;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h2 {
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: #5865f2;
            color: white;
        }

        .modal-btn.secondary {
            background: #383a40;
            color: white;
        }

        .join-input {
            margin-top: 16px;
        }

        .join-input input {
            width: 100%;
            padding: 12px;
            background: #1e1f22;
            border: 1px solid #383a40;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .join-input button {
            width: 100%;
            padding: 12px;
            background: #23a55a;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .room-code-display {
            background: #1e1f22;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .copy-code-btn {
            background: #5865f2;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            font-size: 14px;
        }

        .loading {
            color: #949ba4;
            margin: 20px 0;
        }

        .error-msg {
            color: #da373c;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="app" style="display: none;" id="app">
    <div class="sidebar">
        <div class="server-icon active">SG</div>
    </div>
    <div class="main">
        <div class="header">
            <div>
                <span class="channel-name"># general</span>
                <span class="room-info" id="roomInfo"></span>
            </div>
            <div class="call-controls">
                <button class="icon-btn" id="callBtn">📞</button>
                <button class="icon-btn" id="hangupBtn" style="display: none;">🔴</button>
            </div>
        </div>
        <div class="chat-container">
            <div class="messages" id="messagesList">
                <div class="message">
                    <div class="message-header">SpeekForGeek</div>
                    <div class="message-text">🚀 Готов к работе! Создайте или войдите в комнату.</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
                <button id="sendBtn" disabled>Отправить</button>
            </div>
        </div>
        <div class="peer-info">
            <span>🆔 ID: <strong id="myPeerId">загрузка...</strong></span>
            <span id="peerStatus">⚡ Не в комнате</span>
        </div>
    </div>
</div>

<div id="callOverlay" class="call-overlay" style="display: none;">
    <span>🔊 Активный звонок</span>
    <button class="icon-btn danger" id="endCallOverlayBtn" style="width: 28px; height: 28px;">⏹️</button>
</div>

<div id="roomModal" class="modal">
    <div class="modal-content">
        <h2>🎙️ SpeekForGeek</h2>
        <div id="modalMain">
            <p style="margin-bottom: 20px; color: #949ba4;">Выберите действие</p>
            <div class="modal-buttons">
                <button class="modal-btn primary" id="createRoomBtn">✨ Создать комнату</button>
                <button class="modal-btn secondary" id="joinRoomBtn">🔗 Войти в комнату</button>
            </div>
            <div id="joinPanel" class="join-input" style="display: none;">
                <input type="text" id="roomCodeInput" placeholder="Введите код комнаты">
                <button id="confirmJoinBtn">Подключиться</button>
                <button id="backToMenuBtn" style="margin-top: 8px; background: #383a40;">Назад</button>
            </div>
        </div>
        <div id="createPanel" style="display: none;">
            <div class="loading" id="createLoading">⏳ Подключение...</div>
            <div id="createSuccess" style="display: none;">
                <p>✅ Комната создана!</p>
                <div class="room-code-display" id="roomCodeDisplay"></div>
                <button class="copy-code-btn" id="copyRoomCodeBtn">📋 Скопировать код</button>
                <button id="enterRoomBtn" style="margin-top: 12px; background: #23a55a; padding: 10px; border: none; border-radius: 8px; color: white; cursor: pointer;">Войти в комнату</button>
            </div>
            <div id="createError" class="error-msg" style="display: none;"></div>
            <button id="backFromCreateBtn" style="margin-top: 16px; background: #383a40; padding: 8px; border: none; border-radius: 8px; color: white; cursor: pointer;">Назад</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    // Состояние
    let peer = null;
    let myId = null;
    let currentRoom = null;
    let connections = {};
    let mediaConnections = {};
    let localStream = null;
    let currentCallActive = false;
    let audioElements = {};
    let isReady = false;
    let pendingReady = null;
    
    const randomName = "User_" + Math.floor(Math.random() * 10000);
    
    // DOM элементы
    const appDiv = document.getElementById('app');
    const modal = document.getElementById('roomModal');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const joinPanel = document.getElementById('joinPanel');
    const roomCodeInput = document.getElementById('roomCodeInput');
    const confirmJoinBtn = document.getElementById('confirmJoinBtn');
    const backToMenuBtn = document.getElementById('backToMenuBtn');
    const createPanel = document.getElementById('createPanel');
    const modalMain = document.getElementById('modalMain');
    const createLoading = document.getElementById('createLoading');
    const createSuccess = document.getElementById('createSuccess');
    const createError = document.getElementById('createError');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const copyRoomCodeBtn = document.getElementById('copyRoomCodeBtn');
    const enterRoomBtn = document.getElementById('enterRoomBtn');
    const backFromCreateBtn = document.getElementById('backFromCreateBtn');
    const messagesContainer = document.getElementById('messagesList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const callBtn = document.getElementById('callBtn');
    const hangupBtn = document.getElementById('hangupBtn');
    const myPeerIdSpan = document.getElementById('myPeerId');
    const peerStatusSpan = document.getElementById('peerStatus');
    const callOverlay = document.getElementById('callOverlay');
    const endCallOverlayBtn = document.getElementById('endCallOverlayBtn');
    const roomInfoSpan = document.getElementById('roomInfo');
    
    // Инициализация Peer
    function initPeer() {
        peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });
        
        peer.on('open', (id) => {
            myId = id;
            myPeerIdSpan.innerText = myId.substring(0, 8);
            isReady = true;
            console.log('Peer готов, ID:', myId);
            
            // Если было ожидание создания комнаты
            if (pendingReady === 'create') {
                pendingReady = null;
                actuallyCreateRoom();
            }
        });
        
        peer.on('connection', (conn) => {
            console.log('Входящее соединение от:', conn.peer);
            handleIncomingConnection(conn);
        });
        
        peer.on('call', (call) => {
            handleIncomingCall(call);
        });
        
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            if (createPanel.style.display === 'block') {
                createLoading.style.display = 'none';
                createError.style.display = 'block';
                createError.innerText = 'Ошибка подключения: ' + err.message;
            }
        });
    }
    
    function handleIncomingConnection(conn) {
        const peerId = conn.peer;
        
        conn.on('data', (data) => {
            if (data.type === 'chat') {
                addMessage(data.senderName, data.text, false);
            } else if (data.type === 'system') {
                addSystemMessage(data.text);
            }
        });
        
        conn.on('close', () => {
            delete connections[peerId];
            updatePeerStatus();
            addSystemMessage(`🔌 Пользователь отключился`);
        });
        
        connections[peerId] = conn;
        updatePeerStatus();
        addSystemMessage(`✅ Подключился новый участник`);
        
        // Отправляем приветствие
        conn.send({ type: 'system', text: `${randomName} присоединился к комнате` });
    }
    
    function actuallyCreateRoom() {
        if (!isReady || !peer) {
            pendingReady = 'create';
            return;
        }
        
        currentRoom = myId;
        isRoomCreator = true;
        
        createLoading.style.display = 'none';
        createSuccess.style.display = 'block';
        roomCodeDisplay.innerText = currentRoom.substring(0, 8);
        
        // Копирование кода
        copyRoomCodeBtn.onclick = () => {
            navigator.clipboard.writeText(currentRoom.substring(0, 8));
            addSystemMessage('📋 Код скопирован!');
            copyRoomCodeBtn.innerText = '✅ Скопировано!';
            setTimeout(() => copyRoomCodeBtn.innerText = '📋 Скопировать код', 2000);
        };
        
        // Вход в комнату
        enterRoomBtn.onclick = () => {
            enterRoom(currentRoom);
        };
    }
    
    function enterRoom(roomCode) {
        currentRoom = roomCode;
        modal.style.display = 'none';
        appDiv.style.display = 'flex';
        roomInfoSpan.textContent = `📁 Код: ${roomCode.substring(0, 8)}`;
        peerStatusSpan.innerHTML = `👑 Создатель комнаты`;
        messageInput.disabled = false;
        sendBtn.disabled = false;
        addSystemMessage(`🎉 Комната "${roomCode.substring(0, 8)}" создана!`);
        addSystemMessage(`📤 Поделитесь кодом с друзьями, чтобы они могли подключиться`);
        addSystemMessage(`💡 Друзья должны нажать "Войти в комнату" и ввести этот код`);
    }
    
    function joinRoomByCode(roomCode) {
        if (!isReady) {
            alert('Подождите, подключение...');
            return false;
        }
        
        if (roomCode === myId?.substring(0, 8)) {
            alert('Это ваш собственный код! Используйте "Создать комнату"');
            return false;
        }
        
        // Ищем создателя по коду (нужно восстановить полный ID)
        // Для простоты считаем, что код - это первые 8 символов Peer ID
        // Пытаемся найти среди известных или просто подключаемся
        
        const creatorFullId = roomCode; // на самом деле нужно восстановить, но peerjs позволяет подключиться по части? нет
        // В реальности код должен быть полным ID, но для UX показываем короткий
        // Исправляем: код = полный ID создателя
        
        addSystemMessage(`🔍 Подключение к комнате ${roomCode}...`);
        
        const conn = peer.connect(roomCode);
        
        conn.on('open', () => {
            connections[roomCode] = conn;
            
            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    addMessage(data.senderName, data.text, false);
                } else if (data.type === 'system') {
                    addSystemMessage(data.text);
                }
            });
            
            modal.style.display = 'none';
            appDiv.style.display = 'flex';
            roomInfoSpan.textContent = `📁 Комната: ${roomCode.substring(0, 8)}`;
            peerStatusSpan.innerHTML = `👥 В комнате`;
            messageInput.disabled = false;
            sendBtn.disabled = false;
            addSystemMessage(`✅ Успешно подключено к комнате ${roomCode.substring(0, 8)}!`);
            
            updatePeerStatus();
        });
        
        conn.on('error', (err) => {
            console.error('Ошибка подключения:', err);
            alert('Не удалось подключиться к комнате. Проверьте код и попробуйте снова.');
        });
        
        return true;
    }
    
    let isRoomCreator = false;
    
    function updatePeerStatus() {
        const count = Object.keys(connections).length;
        if (isRoomCreator) {
            peerStatusSpan.innerHTML = `👑 Создатель | Участников: ${count}`;
        } else {
            peerStatusSpan.innerHTML = `👥 В комнате | Участников: ${count + 1}`;
        }
    }
    
    function broadcastMessage(text) {
        const packet = { type: 'chat', text: text, senderName: randomName };
        for (let id in connections) {
            try {
                connections[id].send(packet);
            } catch(e) {}
        }
        addMessage(randomName, text, true);
    }
    
    function addMessage(sender, text, isOwn = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'own' : ''}`;
        msgDiv.innerHTML = `<div class="message-header">${escapeHtml(sender)}</div><div class="message-text">${escapeHtml(text)}</div>`;
        messagesContainer.appendChild(msgDiv);
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    function addSystemMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        msgDiv.style.background = '#1e1f22';
        msgDiv.style.border = '1px solid #2b2d31';
        msgDiv.innerHTML = `<div class="message-header">🖥️ Система</div><div class="message-text">${escapeHtml(text)}</div>`;
        messagesContainer.appendChild(msgDiv);
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // Звонки
    async function startCall() {
        if (currentCallActive) {
            alert('Уже в звонке');
            return;
        }
        if (Object.keys(connections).length === 0) {
            alert('Нет участников');
            return;
        }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCallActive = true;
            callBtn.style.display = 'none';
            hangupBtn.style.display = 'flex';
            callOverlay.style.display = 'flex';
            
            for (let peerId in connections) {
                const call = peer.call(peerId, localStream);
                call.on('stream', (remoteStream) => {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.autoplay = true;
                    audioElements[peerId] = audio;
                });
                mediaConnections[peerId] = call;
            }
            addSystemMessage('📞 Звонок начат');
        } catch(err) {
            alert('Нет доступа к микрофону');
        }
    }
    
    function handleIncomingCall(call) {
        if (currentCallActive) {
            call.close();
            return;
        }
        if (confirm(`Входящий звонок от ${call.peer.substring(0, 8)}. Принять?`)) {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    localStream = stream;
                    currentCallActive = true;
                    callBtn.style.display = 'none';
                    hangupBtn.style.display = 'flex';
                    callOverlay.style.display = 'flex';
                    call.answer(stream);
                    call.on('stream', (remoteStream) => {
                        const audio = new Audio();
                        audio.srcObject = remoteStream;
                        audio.autoplay = true;
                        audioElements[call.peer] = audio;
                    });
                    mediaConnections[call.peer] = call;
                    addSystemMessage('🔊 Звонок начат');
                })
                .catch(() => call.close());
        } else {
            call.close();
        }
    }
    
    function endCall() {
        for (let id in mediaConnections) {
            mediaConnections[id].close();
            if (audioElements[id]) {
                audioElements[id].pause();
                delete audioElements[id];
            }
        }
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        mediaConnections = {};
        currentCallActive = false;
        callBtn.style.display = 'flex';
        hangupBtn.style.display = 'none';
        callOverlay.style.display = 'none';
        addSystemMessage('Звонок завершён');
    }
    
    // UI обработчики
    createRoomBtn.onclick = () => {
        modalMain.style.display = 'none';
        createPanel.style.display = 'block';
        createLoading.style.display = 'block';
        createSuccess.style.display = 'none';
        createError.style.display = 'none';
        
        if (isReady) {
            actuallyCreateRoom();
        } else {
            pendingReady = 'create';
        }
    };
    
    joinRoomBtn.onclick = () => {
        modalMain.style.display = 'none';
        joinPanel.style.display = 'block';
    };
    
    backToMenuBtn.onclick = () => {
        joinPanel.style.display = 'none';
        modalMain.style.display = 'block';
    };
    
    backFromCreateBtn.onclick = () => {
        createPanel.style.display = 'none';
        modalMain.style.display = 'block';
        pendingReady = null;
    };
    
    confirmJoinBtn.onclick = () => {
        const code = roomCodeInput.value.trim();
        if (code) {
            joinRoomByCode(code);
        } else {
            alert('Введите код комнаты');
        }
    };
    
    sendBtn.onclick = () => {
        const text = messageInput.value.trim();
        if (text) {
            if (Object.keys(connections).length > 0 || isRoomCreator) {
                broadcastMessage(text);
                messageInput.value = '';
            } else {
                addSystemMessage('❌ Нет подключённых участников');
            }
        }
    };
    
    messageInput.onkeypress = (e) => {
        if (e.key === 'Enter') sendBtn.click();
    };
    
    callBtn.onclick = startCall;
    hangupBtn.onclick = endCall;
    endCallOverlayBtn.onclick = endCall;
    
    // Запуск
    initPeer();
</script>
</body>
</html>
